<div class="mb-4">
  <a routerLink="/types" class="btn btn-outline-secondary btn-sm">
    ← Torna ai tipi
  </a>
  <h2 class="mt-3 text-capitalize">Tipo: {{ typeName }}</h2>
  <p class="text-muted">Seleziona un pokemon per vedere i dettagli</p>
</div>

@if (loading) {
  <div class="text-center py-5">
    <div class="spinner-border" role="status"></div>
    <p class="mt-2">Caricamento pokemon...</p>
  </div>
}

<div class="row g-3">
  @for (pokemon of pokemonList; track pokemon.name) {
    <div class="col-6 col-md-4 col-lg-3">
      <div
        class="card text-center h-100"
        [routerLink]="['/detail', getPokemonId(pokemon.url)]"
        style="cursor: pointer;"
      >
        <div class="card-body">
          <div style="font-size: 2rem;">
            #{{ getPokemonId(pokemon.url) }}
          </div>
          <p class="card-text text-capitalize fw-bold mt-2">{{ pokemon.name }}</p>
        </div>
      </div>
    </div>
  }
</div>
