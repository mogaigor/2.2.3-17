<div class="row">
  <div class="col-12 mb-4">
    <h2>Scegli una categoria</h2>
    <p class="text-muted">Seleziona un tipo per vedere i pokemon di quella categoria</p>
  </div>
</div>

@if (loading) {
  <div class="text-center py-5">
    <div class="spinner-border text-danger" role="status"></div>
    <p class="mt-2">Caricamento tipi...</p>
  </div>
}

<div class="row g-4 justify-content-center">
  @for (type of types; track type.name) {
    <div class="col-md-4">
      <div
        class="card text-center shadow-sm h-100"
        [routerLink]="['/pokemon', type.name]"
        style="cursor: pointer; transition: transform 0.2s;"
        (mouseenter)="onMouseEnter($event)"
        (mouseleave)="onMouseLeave($event)"
      >
        <div class="card-body py-5">
          <div style="font-size: 4rem;">{{ getTypeEmoji(type.name) }}</div>
          <h3 class="card-title mt-3 text-capitalize fw-bold">{{ type.name }}</h3>
          <span class="badge bg-{{ getTypeColor(type.name) }} mt-2 px-3 py-2">
            Vedi lista
          </span>
        </div>
      </div>
    </div>
  }
</div>
